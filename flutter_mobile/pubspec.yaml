name: intellimetry_mobile
description: IntelliMetry - Fleet Management Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  intl: ^0.19.0
  fl_chart: ^0.69.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  connectivity_plus: ^6.0.3
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  timeago: ^3.6.1
  google_sign_in: ^6.2.1
  google_sign_in_web: ^0.12.4+4
  google_sign_in_platform_interface: ^2.5.0
  pin_code_fields: ^8.0.1
  flutter_map: ^7.0.2
  flutter_map_cancellable_tile_provider: ^3.0.2
  latlong2: ^0.9.0
  vibration: ^3.1.8
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
