<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil — IntelliMettry</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="nav.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #af52de;
            --secondary: #0066ff;
            --success: #34c759;
            --danger: #ff3b30;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--body-bg);
            color: var(--text-main);
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 2rem;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            box-shadow: 0 8px 24px rgba(175, 82, 222, 0.2);
        }

        .profile-info h1 {
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem;
            color: var(--text-main);
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .profile-info p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-c);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(20px);
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-c);
            color: var(--text-main);
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .form-input:focus {
            border-color: var(--primary);
            background: rgba(175, 82, 222, 0.05);
            box-shadow: 0 0 0 3px rgba(175, 82, 222, 0.2);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(175, 82, 222, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            background: #c36ff0;
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn:disabled {
            background: #555;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
        }

        .alert.error {
            background: rgba(255, 59, 48, 0.1);
            color: var(--danger);
            border: 1px solid rgba(255, 59, 48, 0.3);
        }

        .alert.success {
            background: rgba(52, 199, 89, 0.1);
            color: var(--success);
            border: 1px solid rgba(52, 199, 89, 0.3);
        }

        .alert.info {
            background: rgba(0, 212, 255, 0.1);
            color: var(--secondary);
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .google-notice {
            background: rgba(255, 165, 0, 0.1);
            border: 1px solid rgba(255, 165, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            color: #ffa500;
            text-align: center;
            font-weight: 500;
            display: none;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div id="intellimettry-nav-root"></div>

    <div class="intellimettry-main-content">
        <div class="container">
            <div class="profile-header">
                <div class="profile-avatar" id="profAvatar">U</div>
                <div class="profile-info">
                    <h1 id="profName">Chargement...</h1>
                    <p id="profRole">Rôle système</p>
                </div>
            </div>

            <div class="google-notice" id="googleNotice">
                🛡️ Votre compte est géré par Google. La modification de votre mot de passe se fait depuis votre compte
                Google.
            </div>

            <div class="card" id="passwordCard">
                <h2>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" />
                    </svg>
                    Sécurité & Mot de passe
                </h2>

                <div id="pwdAlert" class="alert"></div>

                <form id="pwdForm">
                    <div class="form-group">
                        <label class="form-label">Mot de passe actuel</label>
                        <input type="password" id="curPwd" class="form-input" required
                            placeholder="Saisissez votre mot de passe actuel">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Nouveau mot de passe</label>
                        <input type="password" id="newPwd" class="form-input" required minlength="6"
                            placeholder="Minimum 6 caractères">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Confirmer le mot de passe</label>
                        <input type="password" id="confPwd" class="form-input" required minlength="6"
                            placeholder="Retapez le nouveau mot de passe">
                    </div>
                    <button type="submit" class="btn" id="btnSubmit">Mettre à jour le mot de passe</button>
                </form>
            </div>

            <!-- Bouton de déconnexion global -->
            <button onclick="intellimettryLogout()" class="btn"
                style="background: rgba(255, 59, 48, 0.1); color: var(--danger); border: 1px solid rgba(255, 59, 48, 0.2); box-shadow: none; margin-top: 10px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    style="vertical-align: middle; margin-right: 8px;">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3" />
                </svg>
                Se déconnecter de la plateforme
            </button>
        </div>
    </div>

    <!-- Moteur UI -->
    <script src="nav.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sessionData = localStorage.getItem('admin-session');
            if (!sessionData) {
                window.location.href = 'login.html';
                return;
            }

            const session = JSON.parse(sessionData);

            // Populer UI
            document.getElementById('profName').textContent = session.name || session.email.split('@')[0];
            document.getElementById('profRole').textContent = (session.role || 'Utilisateur') + " — " + session.email;

            if (session.avatar) {
                const av = document.getElementById('profAvatar');
                av.style.backgroundImage = `url(${session.avatar})`;
                av.style.backgroundSize = 'cover';
                av.textContent = '';
            } else {
                document.getElementById('profAvatar').textContent = (session.name || session.email || 'U')[0].toUpperCase();
            }

            // Détection Google Auth: Si on est connecté purement via google sans mot de passe
            // (Il faudrait que le payload JWT ou la session le dise, ici on check si un avatar G est présent,
            // ou bien on laisse l'API backend renvoyer l'erreur "Compte google").

            const form = document.getElementById('pwdForm');
            const btn = document.getElementById('btnSubmit');
            const alertBox = document.getElementById('pwdAlert');

            function showAlert(msg, type) {
                alertBox.textContent = msg;
                alertBox.className = 'alert ' + type;
                alertBox.style.display = 'block';
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                alertBox.style.display = 'none';

                const cur = document.getElementById('curPwd').value;
                const newp = document.getElementById('newPwd').value;
                const conf = document.getElementById('confPwd').value;

                if (newp !== conf) {
                    return showAlert('Les nouveaux mots de passe ne correspondent pas', 'error');
                }
                if (newp.length < 6) {
                    return showAlert('Le nouveau mot de passe doit faire au moins 6 caractères', 'error');
                }

                btn.disabled = true;
                btn.textContent = 'Mise à jour en cours...';

                try {
                    const res = await fetch('/api/auth/password', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            userId: session.id,
                            currentPassword: cur,
                            newPassword: newp
                        })
                    });

                    const data = await res.json();
                    if (!res.ok) {
                        if (data.error && data.error.includes("Google")) {
                            document.getElementById('passwordCard').style.display = 'none';
                            const gn = document.getElementById('googleNotice')
                            gn.style.display = 'block';
                            gn.textContent = data.error;
                            return;
                        }
                        throw new Error(data.error || 'Erreur inconnue');
                    }

                    showAlert('✅ Mot de passe changé avec succès !', 'success');
                    form.reset();
                } catch (err) {
                    showAlert('❌ ' + err.message, 'error');
                } finally {
                    btn.disabled = false;
                    btn.textContent = 'Mettre à jour le mot de passe';
                }
            });
        });
    </script>
</body>

</html>
